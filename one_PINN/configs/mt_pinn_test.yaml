# 1D MT PINN 测试配置文件（快速验证）

# 实验名称
experiment_name: "mt_pinn_1d_test"

# 数据配置
data:
  dataset_path: "data/processed/mt1d_dataset.npz"
  train_ratio: 0.98
  val_ratio: 0.01
  test_ratio: 0.01

# 模型配置
model:
  n_layers: 8
  hidden_width: 128
  activation: "tanh"
  init_log_rho: 2.0

# 深度采样配置
sampling:
  z_min: 10.0
  z_max: 100000.0
  n_samples: 50

# 物理损失配置
physics:
  lambda_rhoa: 1.0
  lambda_phase: 10.0
  adaptive_weighting: true

# 训练配置（测试用，轮数较少）
training:
  device: "cpu"  # 使用 CPU 进行测试
  learning_rate: 0.001
  
  # 课程学习阶段
  curriculum:
    enable: true
    stage1_epochs: 50    # 低频 30%
    stage2_epochs: 50    # 中频 60%
    stage3_epochs: 100   # 全频 100%
    lbfgs_steps: 10      # LBFGS 精细优化
  
  # 标准训练
  standard:
    adam_epochs: 200
    lbfgs_steps: 10

# Checkpoint 配置
checkpoint:
  save_dir: "checkpoints_test"
  save_best: true
  save_interval: 50

# TensorBoard 配置
tensorboard:
  log_dir: "runs_test"
  log_interval: 10

# 评估配置
evaluation:
  results_dir: "results_test"
  plot_format: "png"
  dpi: 150

# 随机种子
seed: 42
