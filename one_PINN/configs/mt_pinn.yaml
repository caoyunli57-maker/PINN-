# 1D MT PINN 反演配置文件

# 实验名称
experiment_name: "mt_pinn_1d"

# 数据配置
data:
  dataset_path: "data/processed/mt1d_dataset.npz"
  train_ratio: 0.98
  val_ratio: 0.01
  test_ratio: 0.01

# 模型配置
model:
  n_layers: 8
  hidden_width: 128
  activation: "tanh"
  init_log_rho: 2.0  # 初始化为 100 Ωm

# 深度采样配置
sampling:
  z_min: 10.0
  z_max: 100000.0
  n_samples: 50

# 物理损失配置
physics:
  lambda_rhoa: 1.0
  lambda_phase: 0.01
  adaptive_weighting: false

# 训练配置
training:
  device: "cuda"
  learning_rate: 0.001
  
  # 课程学习阶段
  curriculum:
    enable: true
    stage1_epochs: 500   # 低频 30%
    stage2_epochs: 500   # 中频 60%
    stage3_epochs: 1000  # 全频 100%
    lbfgs_steps: 100     # LBFGS 精细优化
  
  # 标准训练（不使用课程学习时）
  standard:
    adam_epochs: 2000
    lbfgs_steps: 100

# Checkpoint 配置
checkpoint:
  save_dir: "checkpoints"
  save_best: true
  save_interval: 100  # 每 100 epoch 保存一次

# TensorBoard 配置
tensorboard:
  log_dir: "runs"
  log_interval: 10  # 每 10 epoch 记录一次

# 评估配置
evaluation:
  results_dir: "results"
  plot_format: "png"
  dpi: 300

# 随机种子
seed: 42
